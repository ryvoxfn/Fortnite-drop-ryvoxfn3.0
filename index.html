<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Fortnite Drop PRO PLAYER</title>

<style>
body {margin:0;background:#020617;color:white;font-family:Arial;text-align:center;}
canvas {border:2px solid #1e293b;margin-top:10px;background:url('mapa.png') center/cover;}
button {margin:5px;padding:10px;background:#22c55e;border:none;color:white;border-radius:6px;}
</style>
</head>

<body>

<h2>Drop Calculator PRO PLAYER</h2>

<button onclick="mode='start'">Início</button>
<button onclick="mode='end'">Fim</button>
<button onclick="mode='drop'">Drop</button>
<button onclick="strategy='fast'">Agressivo</button>
<button onclick="strategy='safe'">Seguro</button>

<canvas id="map" width="900" height="600"></canvas>

<script>
const canvas = document.getElementById("map");
const ctx = canvas.getContext("2d");

let mode="start", strategy="fast";
let busStart=null, busEnd=null, drop=null;

// física calibrável
let gravity=0.22;
let maxSpeed=9;
let glideSpeed=3.2;
let deployDist=220;

// simulação detalhada
function simulate(distance){
  let speed=0;
  let d=0;
  let t=0;

  while(d < distance){
    speed += gravity;
    if(speed > maxSpeed) speed = maxSpeed;

    d += speed;
    t += 1;
  }

  return t;
}

// cálculo com estratégia
function evaluate(point){
  let d = Math.hypot(point.x-drop.x, point.y-drop.y);

  let fall = Math.max(0, d - deployDist);

  let tFall = simulate(fall);
  let tGlide = deployDist / glideSpeed;

  let total = tFall + tGlide;

  // estratégia muda decisão
  if(strategy === "safe"){
    total += 15; // penaliza pulo arriscado
  }

  return total;
}

// busca refinada
function findBest(){
  if(!busStart||!busEnd||!drop) return null;

  let best=null;
  let bestScore=Infinity;

  for(let i=0;i<=300;i++){
    let t=i/300;

    let p={
      x: busStart.x + (busEnd.x-busStart.x)*t,
      y: busStart.y + (busEnd.y-busStart.y)*t
    };

    let score = evaluate(p);

    if(score < bestScore){
      bestScore = score;
      best = p;
    }
  }

  return best;
}

// desenho
function drawPoint(p,c,label){
  if(!p) return;

  ctx.fillStyle=c;
  ctx.beginPath();
  ctx.arc(p.x,p.y,10,0,6.28);
  ctx.fill();

  if(label){
    ctx.fillStyle="black";
    ctx.fillRect(p.x-30,p.y-30,60,20);
    ctx.fillStyle="white";
    ctx.fillText(label,p.x,p.y-15);
  }
}

function drawLine(a,b,c){
  if(!a||!b) return;
  ctx.strokeStyle=c;
  ctx.lineWidth=3;
  ctx.beginPath();
  ctx.moveTo(a.x,a.y);
  ctx.lineTo(b.x,b.y);
  ctx.stroke();
}

canvas.onclick=e=>{
  const r=canvas.getBoundingClientRect();
  const x=e.clientX-r.left;
  const y=e.clientY-r.top;

  if(mode==="start") busStart={x,y};
  if(mode==="end") busEnd={x,y};
  if(mode==="drop") drop={x,y};

  draw();
};

function draw(){
  ctx.clearRect(0,0,900,600);

  drawLine(busStart,busEnd,"yellow");
  drawPoint(busStart,"blue");
  drawPoint(busEnd,"purple");
  drawPoint(drop,"red");

  let best = findBest();

  drawPoint(best,"orange","PULAR");
  drawLine(best,drop,"white");
}
</script>

</body>
</html>
