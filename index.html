<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Fortnite Drop COMPETITIVO</title>

<style>
body { margin:0; background:#020617; color:white; font-family:Arial; text-align:center; }
canvas { border:2px solid #1e293b; margin-top:10px; background:url('mapa.png') center/cover; cursor:grab; }
button { margin:5px; padding:10px; border:none; background:#22c55e; color:white; border-radius:6px; }
button:hover { background:#16a34a; }
</style>
</head>

<body>

<h2>Fortnite Drop Calculator COMPETITIVO</h2>

<button onclick="mode='start'">Início ônibus</button>
<button onclick="mode='end'">Fim ônibus</button>
<button onclick="mode='drop'">Drop</button>
<button onclick="resetAll()">Reset</button>

<div id="info">Modo competitivo ativo</div>

<canvas id="map" width="900" height="600"></canvas>

<script>
const canvas = document.getElementById("map");
const ctx = canvas.getContext("2d");

let mode="start", busStart=null, busEnd=null, drop=null;

// física
const gravity = 0.25;
const maxSpeed = 9;
const glideSpeed = 3.2;
const deployDist = 220;
const busSpeed = 5.5;

// zoom
let scale=1, offsetX=0, offsetY=0, drag=false, lx,ly;

canvas.onwheel = e=>{
  e.preventDefault();
  scale *= e.deltaY<0?1.1:0.9;
  draw();
};

canvas.onmousedown=e=>{ drag=true; lx=e.clientX; ly=e.clientY; };
canvas.onmouseup=()=>drag=false;

canvas.onmousemove=e=>{
  if(!drag)return;
  offsetX+=e.clientX-lx;
  offsetY+=e.clientY-ly;
  lx=e.clientX; ly=e.clientY;
  draw();
};

canvas.onclick=e=>{
  const r=canvas.getBoundingClientRect();
  const x=(e.clientX-r.left-offsetX)/scale;
  const y=(e.clientY-r.top-offsetY)/scale;

  if(mode==="start")busStart={x,y};
  if(mode==="end")busEnd={x,y};
  if(mode==="drop")drop={x,y};

  draw();
};

function resetAll(){
  busStart=busEnd=drop=null;
  scale=1; offsetX=offsetY=0;
  draw();
}

const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const norm=v=>{let l=Math.hypot(v.x,v.y); return {x:v.x/l,y:v.y/l};};

// simulação física real
function simulateTime(distance){
  let speed=0, d=0, t=0;

  while(d<distance){
    speed+=gravity;
    if(speed>maxSpeed) speed=maxSpeed;
    d+=speed;
    t++;
  }
  return t;
}

// 🧠 TESTA VÁRIOS PONTOS E PEGA O MELHOR
function findBestJump(){
  if(!busStart||!busEnd||!drop) return null;

  const dir = norm({x:busEnd.x-busStart.x,y:busEnd.y-busStart.y});

  let bestPoint=null;
  let bestTime=Infinity;

  // testa 200 pontos ao longo da linha
  for(let i=0;i<200;i++){
    let t=i/200;

    let point={
      x: busStart.x + (busEnd.x-busStart.x)*t,
      y: busStart.y + (busEnd.y-busStart.y)*t
    };

    let d = dist(point, drop);

    let fallDist = Math.max(0, d-deployDist);

    let timeFall = simulateTime(fallDist);
    let timeGlide = deployDist/glideSpeed;

    let total = timeFall + timeGlide;

    if(total < bestTime){
      bestTime = total;
      bestPoint = point;
    }
  }

  return bestPoint;
}

function drawPoint(p,c,l){
  if(!p)return;
  ctx.fillStyle=c;
  ctx.beginPath();
  ctx.arc(p.x,p.y,10,0,6.28);
  ctx.fill();

  if(l){
    ctx.fillStyle="black";
    ctx.fillRect(p.x-30,p.y-30,60,20);
    ctx.fillStyle="white";
    ctx.fillText(l,p.x,p.y-15);
  }
}

function drawLine(a,b,c){
  if(!a||!b)return;
  ctx.strokeStyle=c;
  ctx.lineWidth=3;
  ctx.beginPath();
  ctx.moveTo(a.x,a.y);
  ctx.lineTo(b.x,b.y);
  ctx.stroke();
}

function draw(){
  ctx.setTransform(scale,0,0,scale,offsetX,offsetY);
  ctx.clearRect(-offsetX/scale,-offsetY/scale,canvas.width/scale,canvas.height/scale);

  drawLine(busStart,busEnd,"yellow");
  drawPoint(busStart,"blue");
  drawPoint(busEnd,"purple");
  drawPoint(drop,"red");

  let best = findBestJump();

  drawPoint(best,"orange","PULAR");
  drawLine(best,drop,"white");
}
</script>

</body>
</html>
